# ─────────────────────────────────────────────────────────────────────────────
# Maritime · Gitea Actions — Vercel Environment Variable Management
#
# Identical to .github/workflows/vercel-env.yml — pure bash + Vercel CLI.
# No GitHub-specific features are used; this file is a verbatim copy.
#
# Gitea differences: none. All logic uses vercel CLI and standard env vars.
# ─────────────────────────────────────────────────────────────────────────────

name: Vercel Env Vars (Gitea)

on:
  push:
    branches: [dev, beta, main]
    paths:
      - "Cairo/**"
      - ".gitea/workflows/vercel-env.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, beta, main]
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - audit
          - sync
          - remove
      var_name:
        description: "Variable name (only for remove action)"
        required: false
        type: string

concurrency:
  group: vercel-env-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vercel-env:
    name: "🔧 Vercel env [${{ github.event.inputs.action || 'sync' }}] → ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'main') || (github.ref == 'refs/heads/beta' && 'beta') || 'dev' }}"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'main') || (github.ref == 'refs/heads/beta' && 'beta') || 'dev' }}
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest --silent

      - name: Resolve Vercel target
        id: ctx
        run: |
          BRANCH_ENV="${{ github.event.inputs.environment }}"
          if [ -z "$BRANCH_ENV" ]; then
            case "${{ github.ref }}" in
              refs/heads/main) BRANCH_ENV=main ;;
              refs/heads/beta) BRANCH_ENV=beta ;;
              *)               BRANCH_ENV=dev  ;;
            esac
          fi
          case "$BRANCH_ENV" in
            main) VERCEL_TARGET=production ;;
            *)    VERCEL_TARGET=preview    ;;
          esac
          ACTION="${{ github.event.inputs.action }}"
          [ -z "$ACTION" ] && ACTION=sync
          echo "branch_env=$BRANCH_ENV"       >> "$GITHUB_OUTPUT"
          echo "vercel_target=$VERCEL_TARGET" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION"               >> "$GITHUB_OUTPUT"

      - name: Audit Vercel env vars
        if: steps.ctx.outputs.action == 'audit' || steps.ctx.outputs.action == 'sync'
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          TARGET="${{ steps.ctx.outputs.vercel_target }}"
          echo "=== Vercel env vars set for: $TARGET ==="
          vercel env ls "$TARGET" --token="$VERCEL_TOKEN" 2>&1

          REQUIRED=(
            NEXT_PUBLIC_BACKEND_URL
            NEXT_PUBLIC_CHAIN_ID
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
            NEXT_PUBLIC_OVERSEER_ADDRESS
            NEXT_PUBLIC_EQUITY_VAULT_ADDRESS
            NEXT_PUBLIC_MDT_ADDRESS
            NEXT_PUBLIC_TRADE_EXECUTOR_ADDRESS
            NEXT_PUBLIC_MARITIME_DEPOSIT_CONTRACT
            NEXT_PUBLIC_MDT_TOKEN_CONTRACT
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
          )
          vercel env ls "$TARGET" --token="$VERCEL_TOKEN" 2>/dev/null > /tmp/vercel_env_list.txt || true
          MISSING=()
          for VAR in "${REQUIRED[@]}"; do
            if grep -q "$VAR" /tmp/vercel_env_list.txt 2>/dev/null; then
              echo "  ✅ $VAR"
            else
              echo "  ❌ $VAR  ← MISSING"
              MISSING+=("$VAR")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::${#MISSING[@]} required variable(s) missing: ${MISSING[*]}"
          else
            echo "✅ All required variables are set in Vercel ($TARGET)"
          fi

      - name: Sync env vars → Vercel
        if: steps.ctx.outputs.action == 'sync'
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          TARGET:            ${{ steps.ctx.outputs.vercel_target }}
          VAL_BACKEND_URL:               ${{ vars.BACKEND_URL }}
          VAL_CHAIN_ID:                  ${{ vars.CHAIN_ID }}
          VAL_OVERSEER_ADDRESS:          ${{ vars.OVERSEER_ADDRESS }}
          VAL_EQUITY_VAULT_ADDRESS:      ${{ vars.EQUITY_VAULT_ADDRESS }}
          VAL_MDT_ADDRESS:               ${{ vars.MDT_ADDRESS }}
          VAL_TRADE_EXECUTOR_ADDRESS:    ${{ vars.TRADE_EXECUTOR_ADDRESS }}
          VAL_MARITIME_DEPOSIT_CONTRACT: ${{ vars.MARITIME_DEPOSIT_CONTRACT }}
          VAL_FIREBASE_AUTH_DOMAIN:      ${{ vars.FIREBASE_AUTH_DOMAIN }}
          VAL_FIREBASE_PROJECT_ID:       ${{ vars.FIREBASE_PROJECT_ID }}
          VAL_WALLETCONNECT_PROJECT_ID:  ${{ secrets.WALLETCONNECT_PROJECT_ID }}
          VAL_FIREBASE_API_KEY:          ${{ secrets.FIREBASE_API_KEY }}
          VAL_PREVIEW_PASSWORD:          ${{ secrets.NEXT_PUBLIC_PREVIEW_PASSWORD }}
        run: |
          upsert() {
            local KEY="$1" VALUE="$2" ENCRYPTED="${3:-false}"
            if [ -z "$VALUE" ]; then echo "  ⚠ Skipping $KEY (empty)"; return; fi
            vercel env rm "$KEY" "$TARGET" --yes --token="$VERCEL_TOKEN" 2>/dev/null || true
            if [ "$ENCRYPTED" = "true" ]; then
              printf '%s' "$VALUE" | vercel env add "$KEY" "$TARGET" --sensitive --token="$VERCEL_TOKEN" --stdin 2>&1
            else
              printf '%s' "$VALUE" | vercel env add "$KEY" "$TARGET" --token="$VERCEL_TOKEN" --stdin 2>&1
            fi
            echo "  ✓ $KEY"
          }
          echo "Syncing env vars → Vercel ($TARGET)…"
          upsert "NEXT_PUBLIC_BACKEND_URL"               "$VAL_BACKEND_URL"
          upsert "NEXT_PUBLIC_CHAIN_ID"                  "$VAL_CHAIN_ID"
          upsert "NEXT_PUBLIC_OVERSEER_ADDRESS"          "$VAL_OVERSEER_ADDRESS"
          upsert "NEXT_PUBLIC_EQUITY_VAULT_ADDRESS"      "$VAL_EQUITY_VAULT_ADDRESS"
          upsert "NEXT_PUBLIC_MDT_ADDRESS"               "$VAL_MDT_ADDRESS"
          upsert "NEXT_PUBLIC_MDT_TOKEN_CONTRACT"        "$VAL_MDT_ADDRESS"
          upsert "NEXT_PUBLIC_TRADE_EXECUTOR_ADDRESS"    "$VAL_TRADE_EXECUTOR_ADDRESS"
          upsert "NEXT_PUBLIC_MARITIME_DEPOSIT_CONTRACT" "$VAL_MARITIME_DEPOSIT_CONTRACT"
          upsert "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"      "$VAL_FIREBASE_AUTH_DOMAIN"
          upsert "NEXT_PUBLIC_FIREBASE_PROJECT_ID"       "$VAL_FIREBASE_PROJECT_ID"
          upsert "NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID"  "$VAL_WALLETCONNECT_PROJECT_ID"  true
          upsert "NEXT_PUBLIC_FIREBASE_API_KEY"          "$VAL_FIREBASE_API_KEY"          true
          upsert "NEXT_PUBLIC_PREVIEW_PASSWORD"          "$VAL_PREVIEW_PASSWORD"          true
          echo "✅ Sync complete"
          vercel env ls "$TARGET" --token="$VERCEL_TOKEN" 2>&1

      - name: Remove env var from Vercel
        if: steps.ctx.outputs.action == 'remove'
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          TARGET:            ${{ steps.ctx.outputs.vercel_target }}
          VAR_NAME:          ${{ github.event.inputs.var_name }}
        run: |
          if [ -z "$VAR_NAME" ]; then echo "❌ var_name is required"; exit 1; fi
          vercel env rm "$VAR_NAME" "$TARGET" --yes --token="$VERCEL_TOKEN"
          echo "✅ Removed $VAR_NAME"
          vercel env ls "$TARGET" --token="$VERCEL_TOKEN" 2>&1
