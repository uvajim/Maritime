# ─────────────────────────────────────────────────────────────────────────────
# Maritime · Gitea Actions — Deployment
#
# Kept in sync with .github/workflows/deploy.yml.
# Differences from the GitHub version:
#
#   ✗ GitHub Environments approval gates — not available in Gitea ≤ v1.22.
#     Workaround: branch protection rules enforce the deployment gate.
#     For main, disable push trigger and require manual workflow_dispatch.
#
#   ✗ environment.url — not rendered in Gitea UI. Deploy URL is printed
#     to the job log instead.
#
#   ✓ workflow_dispatch     — supported since Gitea v1.20
#   ✓ secrets / vars        — supported; set in Settings → Actions → Secrets
#   ✓ contract diff gating  — identical logic to GitHub version
#   ✓ branch guard          — identical to GitHub version
#
# Token notes:
#   Use secrets.GITEA_TOKEN (or the runner auto-token) instead of
#   secrets.GITHUB_TOKEN for any Gitea Package Registry auth.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy (Gitea)

on:
  push:
    branches:
      - dev
      - beta
      # main intentionally omitted — Gitea lacks approval gates, so production
      # deploys require explicit workflow_dispatch to prevent accidental pushes.
      # Re-add main here once Gitea Environment approval gates are available.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, beta, main]
      deploy_frontend:
        description: "Deploy Cairo (Vercel)"
        required: false
        default: "true"
        type: boolean
      deploy_backend:
        description: "Deploy Cairo-backend (Railway)"
        required: false
        default: "true"
        type: boolean
      deploy_contracts:
        description: "Deploy contracts (Hardhat) — overrides diff check"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # GUARD: resolve environment, check branch, detect contract changes
  # ─────────────────────────────────────────────────────────────────────────
  guard:
    name: "🚦 Branch guard"
    runs-on: ubuntu-latest
    outputs:
      environment:       ${{ steps.resolve.outputs.environment }}
      deploy_frontend:   ${{ steps.resolve.outputs.deploy_frontend }}
      deploy_backend:    ${{ steps.resolve.outputs.deploy_backend }}
      deploy_contracts:  ${{ steps.resolve.outputs.deploy_contracts }}
      contracts_changed: ${{ steps.diff.outputs.contracts_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve environment and targets
        id: resolve
        run: |
          REF="${{ github.ref }}"
          if   [[ "$REF" == "refs/heads/main" ]]; then ENV=main
          elif [[ "$REF" == "refs/heads/beta" ]]; then ENV=beta
          elif [[ "$REF" == "refs/heads/dev"  ]]; then ENV=dev
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then ENV="${{ github.event.inputs.environment }}"
          else
            echo "❌ Branch $REF is not a deployment branch."
            exit 1
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy_frontend=${{ github.event.inputs.deploy_frontend }}"   >> "$GITHUB_OUTPUT"
            echo "deploy_backend=${{ github.event.inputs.deploy_backend }}"     >> "$GITHUB_OUTPUT"
            echo "deploy_contracts=${{ github.event.inputs.deploy_contracts }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_frontend=true"   >> "$GITHUB_OUTPUT"
            echo "deploy_backend=true"    >> "$GITHUB_OUTPUT"
            echo "deploy_contracts=false" >> "$GITHUB_OUTPUT"
          fi
          echo "✅ Deploying to: $ENV"

      - name: Detect contract changes
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "contracts_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'cairo-erc20/contracts/**/*.sol' \
            'cairo-erc20/hardhat.config.ts' 2>/dev/null | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "contracts_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$CHANGED contract file(s) changed — contract deployment will run"
          else
            echo "contracts_changed=false" >> "$GITHUB_OUTPUT"
            echo "No Solidity files changed — skipping contract deployment"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # DEPLOY: Cairo → Vercel
  # ─────────────────────────────────────────────────────────────────────────
  deploy-cairo:
    name: "🌐 Deploy cairo → Vercel (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: needs.guard.outputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest --silent
      - name: Deploy
        working-directory: Cairo
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          TARGET=${{ needs.guard.outputs.environment == 'main' && 'production' || 'preview' }}
          vercel pull --yes --environment="$TARGET" --token="$VERCEL_TOKEN"
          FLAG=${{ needs.guard.outputs.environment == 'main' && '--prod' || '' }}
          vercel build $FLAG --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt $FLAG --token="$VERCEL_TOKEN")
          echo "✅ Deployed Cairo to: $DEPLOY_URL"

  # ─────────────────────────────────────────────────────────────────────────
  # DEPLOY: Cairo-backend → Railway
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: "🖥️ Deploy cairo-backend → Railway (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: needs.guard.outputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli --silent
      - name: Deploy
        working-directory: Cairo-backend
        env:
          RAILWAY_TOKEN:      ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(railway up \
            --service "$RAILWAY_SERVICE_ID" \
            --project "$RAILWAY_PROJECT_ID" \
            --detach \
            2>&1 | grep -oE 'https://[^ ]+' | head -1 || echo "")
          echo "✅ Cairo-backend deployed to Railway${DEPLOY_URL:+: $DEPLOY_URL}"

  # ─────────────────────────────────────────────────────────────────────────
  # DEPLOY: Contracts — only when .sol files changed or explicit dispatch
  # ─────────────────────────────────────────────────────────────────────────
  deploy-contracts:
    name: "📜 Deploy contracts (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: |
      needs.guard.outputs.contracts_changed == 'true' ||
      needs.guard.outputs.deploy_contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: cairo-erc20
        run: npm ci --prefer-offline
      - name: Compile
        working-directory: cairo-erc20
        run: npx hardhat compile

      - name: Block mainnet auto-deploy
        if: needs.guard.outputs.environment == 'main' && github.event_name != 'workflow_dispatch'
        run: |
          echo "❌ Mainnet contract deployment requires explicit workflow_dispatch."
          exit 1

      - name: Deploy
        working-directory: cairo-erc20
        env:
          SEPOLIA_RPC_URL:      ${{ secrets.SEPOLIA_RPC_URL }}
          MAINNET_RPC_URL:      ${{ secrets.RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          USER_PRIVATE_KEY:     ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          VAULT_PRIVATE_KEY:    ${{ secrets.MINTER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY:    ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          NETWORK=${{ needs.guard.outputs.environment == 'main' && 'mainnet' || 'sepolia' }}
          echo "Deploying to $NETWORK…"
          npx hardhat run scripts/deploy-maritime-deposit.ts --network "$NETWORK"
          npx hardhat run scripts/deploy-equity-vault.ts     --network "$NETWORK"
          npx hardhat run scripts/deploy-overseer.ts         --network "$NETWORK"
          npx hardhat run scripts/deploy-trade-executor.ts   --network "$NETWORK"
          npx hardhat run scripts/grant-roles.ts             --network "$NETWORK"
          echo "✅ Contracts deployed to $NETWORK"

  # ─────────────────────────────────────────────────────────────────────────
  # SMOKE TEST
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "💨 Smoke test (${{ needs.guard.outputs.environment }})"
    needs: [guard, deploy-cairo, deploy-backend]
    if: |
      always() &&
      (needs.deploy-cairo.result == 'success' || needs.deploy-backend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Health-check backend
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then echo "::notice::BACKEND_URL not set — skipping"; exit 0; fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            [ "$STATUS" = "200" ] && echo "✅ Backend healthy" && exit 0
            echo "Attempt $i/5: $STATUS"; sleep 10
          done
          echo "❌ Backend health check failed"; exit 1

      - name: Health-check frontend
        run: |
          FRONTEND_URL="${{ vars.FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then echo "::notice::FRONTEND_URL not set — skipping"; exit 0; fi
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Frontend reachable" || { echo "❌ Got $STATUS"; exit 1; }
