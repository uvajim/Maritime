# ─────────────────────────────────────────────────────────────────────────────
# Maritime · Gitea Actions — Docker Build & Push
#
# Kept in sync with .github/workflows/docker.yml.
# Differences from the GitHub version:
#
#   ✗ Sigstore cosign keyless signing — requires GitHub OIDC (id-token: write).
#     Gitea has no OIDC token issuer. Replaced with cosign key-based signing
#     using COSIGN_PRIVATE_KEY secret, or skipped if key not configured.
#
#   ✗ ghcr.io — use Gitea Container Registry instead:
#     <your-gitea-host>/v2/<owner>/<image>
#     Set GITEA_REGISTRY variable to your Gitea host (e.g. gitea.example.com).
#     Falls back to ghcr.io if GITEA_REGISTRY is not set (for mirrored repos).
#
#   ✓ Multi-arch builds (linux/amd64 + linux/arm64) — identical, requires
#     Docker + QEMU on the acts_runner host.
#
#   ✓ Build cache — uses local cache (type=local) instead of type=gha.
#     Gitea's built-in cache (v1.21+) can be enabled by changing to type=gha
#     once your acts_runner is configured with a Gitea cache backend.
#
#   ✓ Metadata (tags, labels) — identical.
#
# Runner requirements:
#   acts_runner v0.2+ with Docker and QEMU binfmt support.
#   Install QEMU on the host: apt-get install qemu-user-static
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Build & Push (Gitea)

on:
  push:
    branches:
      - dev
      - beta
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, beta, main]
      push_image:
        description: "Push to registry (false = build only)"
        required: false
        default: "true"
        type: boolean

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  # Override GITEA_REGISTRY with your Gitea host in repo variables.
  # If unset, falls back to ghcr.io (for mirrored GitHub repos).
  REGISTRY: ${{ vars.GITEA_REGISTRY || 'ghcr.io' }}
  IMAGE_CAIRO:         ${{ vars.GITEA_REGISTRY || 'ghcr.io' }}/${{ github.repository_owner }}/maritime-cairo
  IMAGE_CAIRO_BACKEND: ${{ vars.GITEA_REGISTRY || 'ghcr.io' }}/${{ github.repository_owner }}/maritime-cairo-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Compute shared metadata
  # ─────────────────────────────────────────────────────────────────────────
  meta:
    name: "📋 Compute image tags"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      sha_short:   ${{ steps.env.outputs.sha_short }}
      push:        ${{ steps.env.outputs.push }}
    steps:
      - name: Resolve environment and tags
        id: env
        run: |
          REF="${{ github.ref }}"
          DISPATCH_ENV="${{ github.event.inputs.environment }}"
          DISPATCH_PUSH="${{ github.event.inputs.push_image }}"

          if   [[ "$REF" == "refs/heads/main"  || "$DISPATCH_ENV" == "main"  ]]; then ENV=main
          elif [[ "$REF" == "refs/heads/beta"  || "$DISPATCH_ENV" == "beta"  ]]; then ENV=beta
          else ENV=dev
          fi

          SHA=$(echo "${{ github.sha }}" | head -c 7)
          PUSH="true"
          [[ "$DISPATCH_PUSH" == "false" ]] && PUSH="false"

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA"   >> "$GITHUB_OUTPUT"
          echo "push=$PUSH"       >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # Build cairo (Next.js frontend)
  # ─────────────────────────────────────────────────────────────────────────
  build-cairo:
    name: "🌐 Build cairo"
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-compilation for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Gitea: use GITEA_TOKEN (auto-provisioned by acts_runner) or
          # a personal access token stored as GITEA_REGISTRY_TOKEN.
          # GitHub mirror: use GITHUB_TOKEN.
          password: ${{ secrets.GITEA_REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CAIRO }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.environment }}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push cairo
        uses: docker/build-push-action@v6
        with:
          context: Cairo
          file: Cairo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Local cache — works without a cache backend.
          # Switch to type=gha once Gitea cache backend is configured.
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_ENV=${{ needs.meta.outputs.environment }}
            NODE_VERSION=22

      # Prevent cache from growing unboundedly
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────
  # Build cairo-backend (Express API)
  # ─────────────────────────────────────────────────────────────────────────
  build-cairo-backend:
    name: "🖥️ Build cairo-backend"
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CAIRO_BACKEND }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.environment }}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push cairo-backend
        uses: docker/build-push-action@v6
        with:
          context: Cairo-backend
          file: Cairo-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_ENV=${{ needs.meta.outputs.environment }}
            NODE_VERSION=22

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────────────────
  # Sign images with cosign (main branch only)
  # Uses key-based signing — Gitea has no OIDC issuer for keyless signing.
  #
  # To enable:
  #   1. Generate a cosign key pair:  cosign generate-key-pair
  #   2. Store cosign.key contents as secret COSIGN_PRIVATE_KEY
  #   3. Store cosign.pub as variable COSIGN_PUBLIC_KEY (for verification)
  #   4. Store the key password as COSIGN_PASSWORD (or leave empty)
  #
  # If COSIGN_PRIVATE_KEY is not set, this job is skipped gracefully.
  # ─────────────────────────────────────────────────────────────────────────
  sign:
    name: "🔏 Sign images (cosign key-based)"
    needs: [meta, build-cairo, build-cairo-backend]
    if: github.ref == 'refs/heads/main' && needs.meta.outputs.push == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEA_REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sign cairo (key-based)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then
            echo "::notice::COSIGN_PRIVATE_KEY not set — skipping image signing"
            echo "To enable: cosign generate-key-pair and store cosign.key as COSIGN_PRIVATE_KEY"
            exit 0
          fi
          echo "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
          cosign sign --key /tmp/cosign.key --yes \
            ${{ env.IMAGE_CAIRO }}:${{ needs.meta.outputs.sha_short }} \
            2>/dev/null || echo "::warning::cosign signing failed"
          rm -f /tmp/cosign.key

      - name: Sign cairo-backend (key-based)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD:    ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then exit 0; fi
          echo "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
          cosign sign --key /tmp/cosign.key --yes \
            ${{ env.IMAGE_CAIRO_BACKEND }}:${{ needs.meta.outputs.sha_short }} \
            2>/dev/null || echo "::warning::cosign signing failed"
          rm -f /tmp/cosign.key
