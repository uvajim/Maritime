# ─────────────────────────────────────────────────────────────────────────────
# Maritime · Deployment Workflow
#
# Deploys to one of three environments:
#   • dev   — feature integration; auto-deploys on push to dev branch
#   • beta  — staging / QA;        auto-deploys on push to beta branch
#   • main  — production;          auto-deploys on push to main branch
#
# ⚠  SECURITY INVARIANT ⚠
#   Deployments ONLY run from the three protected branches above OR via
#   manual workflow_dispatch. Arbitrary branches cannot deploy.
#
# Architecture
# ────────────
# Frontend (Vercel):
#   Vercel env vars are managed by vercel-env.yml using vercel env ls/add/rm.
#   This job only authenticates + vercel pull → vercel build → vercel deploy.
#   VERCEL_TOKEN must be a personal access token (vercel.com/account/tokens).
#
# Backend (Railway):
#   Railway dashboard is the source of truth for service env vars.
#   This job only authenticates and calls `railway up`.
#
# Contracts (Hardhat):
#   Only redeploys when .sol files or hardhat.config.ts changed in this push,
#   or when deploy_contracts=true is set via workflow_dispatch.
#   Mainnet auto-deploy on push is always blocked — requires workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches:
      - dev
      - beta
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, beta, main]
      deploy_frontend:
        description: "Deploy Cairo (Vercel)"
        required: false
        default: "true"
        type: boolean
      deploy_backend:
        description: "Deploy Cairo-backend (Railway)"
        required: false
        default: "true"
        type: boolean
      deploy_contracts:
        description: "Deploy contracts (Hardhat) — ignores diff check"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

# ═════════════════════════════════════════════════════════════════════════════
# GUARD: resolve environment, check branch, detect what changed
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  guard:
    name: "🚦 Branch guard"
    runs-on: ubuntu-latest
    outputs:
      environment:        ${{ steps.resolve.outputs.environment }}
      deploy_frontend:    ${{ steps.resolve.outputs.deploy_frontend }}
      deploy_backend:     ${{ steps.resolve.outputs.deploy_backend }}
      deploy_contracts:   ${{ steps.resolve.outputs.deploy_contracts }}
      contracts_changed:  ${{ steps.diff.outputs.contracts_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit for diff

      - name: Resolve environment and targets
        id: resolve
        run: |
          REF="${{ github.ref }}"
          if   [[ "$REF" == "refs/heads/main" ]]; then ENV=main
          elif [[ "$REF" == "refs/heads/beta" ]]; then ENV=beta
          elif [[ "$REF" == "refs/heads/dev"  ]]; then ENV=dev
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then ENV="${{ github.event.inputs.environment }}"
          else
            echo "❌ Branch $REF is not a deployment branch."
            exit 1
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy_frontend=${{ github.event.inputs.deploy_frontend }}"   >> "$GITHUB_OUTPUT"
            echo "deploy_backend=${{ github.event.inputs.deploy_backend }}"     >> "$GITHUB_OUTPUT"
            echo "deploy_contracts=${{ github.event.inputs.deploy_contracts }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_frontend=true"   >> "$GITHUB_OUTPUT"
            echo "deploy_backend=true"    >> "$GITHUB_OUTPUT"
            echo "deploy_contracts=false" >> "$GITHUB_OUTPUT"
          fi
          echo "✅ Deploying to: $ENV"

      - name: Detect contract changes
        id: diff
        run: |
          # Check if any Solidity files changed in this push.
          # On workflow_dispatch, treat as no auto-change (dispatch controls it explicitly).
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "contracts_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'cairo-erc20/contracts/**/*.sol' 'cairo-erc20/hardhat.config.ts' 2>/dev/null | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "contracts_changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$CHANGED contract file(s) changed — contract deployment will run"
            git diff --name-only HEAD~1 HEAD -- 'cairo-erc20/contracts/**/*.sol' 'cairo-erc20/hardhat.config.ts'
          else
            echo "contracts_changed=false" >> "$GITHUB_OUTPUT"
            echo "No Solidity files changed — skipping contract deployment"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY: Cairo frontend → Vercel
  #
  # Vercel manages its own env vars — configure them in the Vercel dashboard.
  # This job only authenticates and deploys; it does not push or sync vars.
  #
  # Required secret in GitHub Environment: VERCEL_TOKEN
  #   → Generate at vercel.com/account/tokens (personal access token, not OIDC)
  # Required variables: VERCEL_ORG_ID, VERCEL_PROJECT_ID
  #   → Found in .vercel/project.json after running `vercel link` locally
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-cairo:
    name: "🌐 Deploy cairo → Vercel (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: needs.guard.outputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.guard.outputs.environment }}
      url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Cairo/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest --silent

      - name: Pull Vercel project settings & env vars
        working-directory: Cairo
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          TARGET=${{ needs.guard.outputs.environment == 'main' && 'production' || 'preview' }}
          vercel pull --yes --environment="$TARGET" --token="$VERCEL_TOKEN"

      - name: Build
        working-directory: Cairo
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          FLAG=${{ needs.guard.outputs.environment == 'main' && '--prod' || '' }}
          vercel build $FLAG --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        working-directory: Cairo
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          FLAG=${{ needs.guard.outputs.environment == 'main' && '--prod' || '' }}
          DEPLOY_URL=$(vercel deploy --prebuilt $FLAG --token="$VERCEL_TOKEN")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed Cairo to: $DEPLOY_URL"

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY: Cairo-backend → Railway
  #
  # Railway manages its own service env vars — configure in Railway dashboard.
  # This job only authenticates and deploys.
  #
  # Required secret: RAILWAY_TOKEN (railway.app → Account → API Tokens)
  # Required variables: RAILWAY_PROJECT_ID, RAILWAY_SERVICE_ID
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: "🖥️ Deploy cairo-backend → Railway (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: needs.guard.outputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.guard.outputs.environment }}
      url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli --silent

      - name: Deploy to Railway
        id: deploy
        working-directory: Cairo-backend
        env:
          RAILWAY_TOKEN:      ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(railway up \
            --service "$RAILWAY_SERVICE_ID" \
            --project "$RAILWAY_PROJECT_ID" \
            --detach \
            2>&1 | grep -oE 'https://[^ ]+' | head -1 || echo "")
          echo "deploy_url=${DEPLOY_URL:-https://railway.app}" >> "$GITHUB_OUTPUT"
          echo "✅ Cairo-backend deployed to Railway"

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY: Smart contracts (Hardhat)
  #
  # Runs when:
  #   • .sol files or hardhat.config.ts changed in this push, OR
  #   • deploy_contracts=true passed via workflow_dispatch
  #
  # Never runs automatically on non-contract changes.
  # Always requires explicit dispatch to deploy to mainnet (main env).
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-contracts:
    name: "📜 Deploy contracts (${{ needs.guard.outputs.environment }})"
    needs: guard
    if: |
      needs.guard.outputs.contracts_changed == 'true' ||
      needs.guard.outputs.deploy_contracts == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cairo-erc20/package-lock.json

      - name: Install dependencies
        working-directory: cairo-erc20
        run: npm ci --prefer-offline

      - name: Compile contracts
        working-directory: cairo-erc20
        run: npx hardhat compile

      - name: Confirm mainnet deploy
        # Extra guard: mainnet deploys must be explicit dispatch, never auto.
        if: needs.guard.outputs.environment == 'main' && github.event_name != 'workflow_dispatch'
        run: |
          echo "❌ Mainnet contract deployment requires explicit workflow_dispatch."
          echo "   Auto-deploy on push is disabled for mainnet to prevent accidental deploys."
          exit 1

      - name: Determine network
        id: network
        run: |
          case "${{ needs.guard.outputs.environment }}" in
            main) echo "network=mainnet" >> "$GITHUB_OUTPUT" ;;
            *)    echo "network=sepolia" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Deploy contracts
        working-directory: cairo-erc20
        env:
          SEPOLIA_RPC_URL:      ${{ secrets.SEPOLIA_RPC_URL }}
          MAINNET_RPC_URL:      ${{ secrets.RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          USER_PRIVATE_KEY:     ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          VAULT_PRIVATE_KEY:    ${{ secrets.MINTER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY:    ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          NETWORK="${{ steps.network.outputs.network }}"
          echo "Deploying to $NETWORK…"
          npx hardhat run scripts/deploy-maritime-deposit.ts --network "$NETWORK"
          npx hardhat run scripts/deploy-equity-vault.ts     --network "$NETWORK"
          npx hardhat run scripts/deploy-overseer.ts         --network "$NETWORK"
          npx hardhat run scripts/deploy-trade-executor.ts   --network "$NETWORK"
          npx hardhat run scripts/grant-roles.ts             --network "$NETWORK"
          echo "✅ Contracts deployed to $NETWORK"

      - name: Verify on Etherscan
        if: needs.guard.outputs.environment == 'main' || needs.guard.outputs.environment == 'beta'
        working-directory: cairo-erc20
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          echo "::notice::Add contract addresses to this step after first deployment."
          # npx hardhat verify --network ${{ steps.network.outputs.network }} <ADDRESS>

  # ═══════════════════════════════════════════════════════════════════════════
  # POST-DEPLOY: Smoke tests
  # ═══════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: "💨 Smoke test (${{ needs.guard.outputs.environment }})"
    needs: [guard, deploy-cairo, deploy-backend]
    if: |
      always() &&
      (needs.deploy-cairo.result == 'success' || needs.deploy-backend.result == 'success')
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    steps:
      - name: Health-check backend
        # Only check the backend if it was actually deployed in this run.
        # Skips gracefully when only the frontend was deployed (no Railway token yet, etc.)
        if: needs.deploy-backend.result == 'success'
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "::notice::BACKEND_URL not set — skipping backend health check"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")
            [ "$STATUS" = "200" ] && echo "✅ Backend healthy" && exit 0
            echo "Attempt $i/5: $STATUS, retrying…"; sleep 10
          done
          echo "❌ Backend health check failed"; exit 1

      - name: Health-check frontend
        run: |
          FRONTEND_URL="${{ vars.FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            echo "::notice::FRONTEND_URL not set — skipping frontend health check"
            exit 0
          fi
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
          [ "$STATUS" = "200" ] && echo "✅ Frontend reachable" || { echo "❌ Got $STATUS"; exit 1; }
