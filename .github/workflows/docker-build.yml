name: Docker Build

# Builds container images for the deployable services (Cairo frontend,
# Cairo-backend API). cairo-erc20 is contracts only and has no image.
#
# - On PRs / feature branches: build single-arch (amd64) for validation only,
#   scan with Trivy, never push.
# - On push to dev/beta/main, or workflow_dispatch with push_image=true on an
#   approved branch: build multi-arch (linux/amd64,linux/arm64) and push to
#   Docker Hub, tagged with the environment and commit SHA.
#
# Images are published to Docker Hub purely as a portable artifact — they are
# NOT what `deploy.yml` uses to ship to Vercel/Railway today, but they are
# exactly what you'd run on Render/Fly.io/AWS/GCP/Azure/self-hosted Docker
# when migrating later (see docs/DEPLOYMENT.md).

on:
  push:
    branches: [dev, beta, main]
  pull_request:
    branches: [dev, beta, main]
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push images to Docker Hub (only allowed on dev/beta/main)"
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_BRANCHES: "dev beta main"

jobs:
  resolve:
    name: Resolve build mode
    runs-on: ubuntu-latest
    outputs:
      should_push: ${{ steps.resolve.outputs.should_push }}
      env_name: ${{ steps.resolve.outputs.env_name }}
    steps:
      - id: resolve
        run: |
          REF_NAME="${{ github.ref_name }}"
          IS_DEPLOY_BRANCH="false"
          for b in $DEPLOY_BRANCHES; do
            [ "$REF_NAME" = "$b" ] && IS_DEPLOY_BRANCH="true"
          done

          SHOULD_PUSH="false"
          if [ "${{ github.event_name }}" = "push" ] && [ "$IS_DEPLOY_BRANCH" = "true" ]; then
            SHOULD_PUSH="true"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.push_image }}" = "true" ]; then
            if [ "$IS_DEPLOY_BRANCH" != "true" ]; then
              echo "::error::push_image=true is only allowed when running this workflow on dev, beta, or main (got '$REF_NAME')."
              exit 1
            fi
            SHOULD_PUSH="true"
          fi

          echo "should_push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"
          echo "env_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved: should_push=$SHOULD_PUSH env_name=$REF_NAME"

  build:
    name: build (${{ matrix.name }})
    needs: [resolve]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: Cairo
            image: cairo-frontend
          - name: backend
            path: Cairo-backend
            image: cairo-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: needs.resolve.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (validation only, single-arch, not pushed)
        if: needs.resolve.outputs.should_push != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ matrix.image }}:ci-${{ github.sha }}

      - name: Scan image with Trivy
        if: needs.resolve.outputs.should_push != 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Build and push (multi-arch)
        if: needs.resolve.outputs.should_push == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.resolve.outputs.env_name }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.resolve.outputs.env_name }}-latest
