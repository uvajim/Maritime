# ─────────────────────────────────────────────────────────────────────────────
# Maritime · Docker Build & Push
#
# Builds and pushes multi-architecture container images:
#   • linux/amd64  (x86_64 — cloud hosts, most CI runners)
#   • linux/arm64  (Apple Silicon, Graviton, Raspberry Pi 4+)
#
# Images are published to ghcr.io (GitHub Container Registry).
# To switch to Docker Hub, Quay, or another registry see the
# "Image registry" section in docs/cicd/MIGRATION.md.
#
# Triggered by:
#   • Pushes to deployment branches (dev, beta, main)
#   • Manual workflow_dispatch with optional tag override
#
# Tags produced:
#   • <registry>/<image>:latest       (main branch only)
#   • <registry>/<image>:<env>        (dev | beta | main)
#   • <registry>/<image>:<sha>        (every build, for rollback)
#   • <registry>/<image>:<semver>     (when a git tag like v1.2.3 is pushed)
#
# [Gitea note] Gitea Packages (Gitea Container Registry) is supported as
# an alternative registry. See .gitea/workflows/docker.yml.
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Build & Push

on:
  push:
    branches:
      - dev
      - beta
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, beta, main]
      image_tag:
        description: "Override image tag (leave blank for auto)"
        required: false
        type: string
      push_image:
        description: "Push to registry (false = build only)"
        required: false
        default: "true"
        type: boolean

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a docker push mid-flight

permissions:
  contents: read
  packages: write   # Required to push to ghcr.io

env:
  REGISTRY: ghcr.io
  # Images are namespaced to the repo owner (lowercase enforced below).
  IMAGE_CAIRO:         ghcr.io/${{ github.repository_owner }}/maritime-cairo
  IMAGE_CAIRO_BACKEND: ghcr.io/${{ github.repository_owner }}/maritime-cairo-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-compute metadata shared between image jobs.
  # ─────────────────────────────────────────────────────────────────────────
  meta:
    name: "📋 Compute image tags"
    runs-on: ubuntu-latest
    outputs:
      environment:  ${{ steps.env.outputs.environment }}
      image_suffix: ${{ steps.env.outputs.image_suffix }}
      sha_short:    ${{ steps.env.outputs.sha_short }}
      push:         ${{ steps.env.outputs.push }}
    steps:
      - name: Resolve environment and tags
        id: env
        run: |
          REF="${{ github.ref }}"
          DISPATCH_ENV="${{ github.event.inputs.environment }}"
          DISPATCH_PUSH="${{ github.event.inputs.push_image }}"

          # Determine environment from branch or manual input.
          if   [[ "$REF" == "refs/heads/main"  || "$DISPATCH_ENV" == "main"  ]]; then ENV=main
          elif [[ "$REF" == "refs/heads/beta"  || "$DISPATCH_ENV" == "beta"  ]]; then ENV=beta
          elif [[ "$REF" == "refs/heads/dev"   || "$DISPATCH_ENV" == "dev"   ]]; then ENV=dev
          else ENV=dev
          fi

          SHA=$(echo "${{ github.sha }}" | head -c 7)
          PUSH="true"
          [[ "$DISPATCH_PUSH" == "false" ]] && PUSH="false"

          echo "environment=$ENV"    >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA"      >> "$GITHUB_OUTPUT"
          echo "push=$PUSH"          >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # Build and push: Cairo (Next.js frontend)
  # ─────────────────────────────────────────────────────────────────────────
  build-cairo:
    name: "🌐 Build cairo"
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CAIRO }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.environment }}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push cairo
        uses: docker/build-push-action@v6
        with:
          context: Cairo
          file: Cairo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=${{ needs.meta.outputs.environment }}
            NODE_VERSION=22

      - name: Output image digest
        run: echo "Image digest for cairo ${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────────────────────────────────────────
  # Build and push: Cairo-backend (Express API)
  # ─────────────────────────────────────────────────────────────────────────
  build-cairo-backend:
    name: "🖥️ Build cairo-backend"
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_CAIRO_BACKEND }}
          tags: |
            type=raw,value=${{ needs.meta.outputs.environment }}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push cairo-backend
        uses: docker/build-push-action@v6
        with:
          context: Cairo-backend
          file: Cairo-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=${{ needs.meta.outputs.environment }}
            NODE_VERSION=22

  # ─────────────────────────────────────────────────────────────────────────
  # Sign images with Sigstore cosign (main branch only)
  # This provides supply-chain provenance.
  # ─────────────────────────────────────────────────────────────────────────
  sign:
    name: "🔏 Sign images (cosign)"
    needs: [meta, build-cairo, build-cairo-backend]
    if: github.ref == 'refs/heads/main' && needs.meta.outputs.push == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # Required for keyless signing via OIDC
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign cairo
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_CAIRO }}@${{ needs.build-cairo.outputs.digest }} \
            2>/dev/null || echo "::warning::cosign signing skipped (digest not available in output)"

      - name: Sign cairo-backend
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_CAIRO_BACKEND }}@${{ needs.build-cairo-backend.outputs.digest }} \
            2>/dev/null || echo "::warning::cosign signing skipped"
